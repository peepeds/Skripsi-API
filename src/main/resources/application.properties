spring.application.name=skripsi

spring.datasource.url=${DB_URL}
#spring.datasource.username=postgres
#spring.datasource.password=postgres
spring.datasource.driverClassName=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

spring.jackson.property-naming-strategy=LOWER_CAMEL_CASE

spring.security.user.name=test
spring.security.user.password=test

jwt.refresh.secret=${REFRESH_SECRET}
jwt.access.secret=${ACCESS_SECRET}
jwt.refresh.expiration=${REFRESH_EXP}
jwt.access.expiration=${ACCESS_EXP}

spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

server.port=8443
server.ssl.enabled=true
server.ssl.key-store=classpath:keystore.p12
server.ssl.key-store-type=PKCS12
server.ssl.key-store-password=test123
server.ssl.key-alias=spring-boot

minio.endpoint=${MINIO_ENDPOINT}
minio.proxyEndpoint=${MINIO_PROXY_ENDPOINT}
minio.accessKey=${MINIO_ACCESS_KEY}
minio.secretKey=${MINIO_SECRET_KEY}
minio.bucketName=${MINIO_BUCKET_NAME}